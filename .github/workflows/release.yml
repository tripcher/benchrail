name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Require main branch
        if: github.ref_name != 'main'
        run: |
          echo "Run this workflow from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bump version
        id: bump
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          bump = "${{ inputs.bump }}"
          path = Path("benchrail/__init__.py")
          text = path.read_text()
          match = re.search(r'__version__ = "(\d+)\.(\d+)\.(\d+)"', text)
          if match is None:
              raise SystemExit("Unable to locate __version__ in benchrail/__init__.py")

          major, minor, patch = (int(part) for part in match.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump type: {bump}")

          version = f"{major}.{minor}.{patch}"
          path.write_text(
              re.sub(
                  r'__version__ = "\d+\.\d+\.\d+"',
                  f'__version__ = "{version}"',
                  text,
              )
          )
          Path("/tmp/benchrail_version").write_text(version)
          PY

          version="$(cat /tmp/benchrail_version)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchrail/__init__.py pyproject.toml
          git commit -m "Release ${{ steps.bump.outputs.tag }} [skip ci]"

      - name: Create git tag
        run: git tag "${{ steps.bump.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

  publish:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

  create-github-release:
    needs: [release, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.release.outputs.tag }}" \
            --title "${{ needs.release.outputs.tag }}" \
            --notes "Release ${{ needs.release.outputs.tag }}"
