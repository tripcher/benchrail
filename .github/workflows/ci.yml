name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check benchrail/ tests/

      - name: Check formatting
        run: uv run ruff format --check benchrail/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --dev

      - name: Type check
        run: uv run mypy benchrail tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
          - python-version: "3.11"
          - python-version: "3.12"
          - python-version: "3.13"
          - python-version: "3.10"
            pydantic-spec: "pydantic<2"
            pydantic-major: "1"
          - python-version: "3.10"
            pydantic-spec: "pydantic>=2,<3"
            pydantic-major: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Pin Pydantic ${{ matrix.pydantic-spec }}
        if: ${{ matrix.pydantic-spec != '' }}
        run: uv pip install --python .venv/bin/python "${{ matrix.pydantic-spec }}"

      - name: Verify Pydantic ${{ matrix.pydantic-major }}.x
        if: ${{ matrix.pydantic-major != '' }}
        run: |
          uv run --no-sync --python ${{ matrix.python-version }} python -c \
            "import pydantic; assert pydantic.VERSION.startswith('${{ matrix.pydantic-major }}.')"

      - name: Run unit tests
        run: uv run --no-sync --python ${{ matrix.python-version }} pytest tests/unit/ -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --dev

      - name: Build package
        run: uv run python -m build

      - name: Check distribution metadata
        run: uv run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
