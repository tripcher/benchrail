name: Publish to PyPI

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag }}

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --dev

      - name: Build package
        run: uv run python -m build

      - name: Check distribution metadata
        run: uv run twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    needs: publish-pypi
    name: Publish Docker (${{ matrix.image_name }} ${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: universal
            image_repository: benchrail-universal
            dockerfile: docker/universal/Dockerfile
            platform: linux/amd64
            platform_pair: linux-amd64
          - image_name: universal
            image_repository: benchrail-universal
            dockerfile: docker/universal/Dockerfile
            platform: linux/arm64
            platform_pair: linux-arm64
          - image_name: python
            image_repository: benchrail-python
            dockerfile: docker/python/Dockerfile
            platform: linux/amd64
            platform_pair: linux-amd64
          - image_name: python
            image_repository: benchrail-python
            dockerfile: docker/python/Dockerfile
            platform: linux/arm64
            platform_pair: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repository }},name-canonical=true,push-by-digest=true,push=true
          cache-from: type=gha,scope=${{ matrix.image_repository }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_repository }}-${{ matrix.platform_pair }}

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image_name }}-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker-manifest:
    needs: publish-docker
    name: Publish Docker manifest (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: universal
            image_repository: benchrail-universal
          - image_name: python
            image_repository: benchrail-python
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image_name }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.RELEASE_TAG }}

      - name: Create multi-platform manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          tags="$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          images=""

          for digest_path in /tmp/digests/*; do
            digest="$(basename "$digest_path")"
            images="${images} ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repository }}@sha256:${digest}"
          done

          docker buildx imagetools create ${tags} ${images}

      - name: Inspect published manifest
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repository }}:${{ env.RELEASE_TAG }}
