name: Bug report
description: Report a reproducible problem in benchrail.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest commands or dataset needed to reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include benchrail version, Python version, execution mode, and operating system.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, authentication files, and sensitive local paths.
      render: shell
